<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ポケット・プラネタリウム</title>
    　　<link rel="manifest" href="manifest.json">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #ui-container {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 90%;
            max-width: 400px;
            display: flex;
            gap: 5px;
        }
        #search-input {
            flex-grow: 1;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        #search-btn {
            padding: 10px 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 20px;
            pointer-events: none;
            text-align: center;
            font-size: 14px;
        }
        #permission-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            padding: 15px 30px;
            font-size: 18px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <button id="permission-btn">センサーを起動してスタート</button>

    <div id="ui-container">
        <input type="text" id="search-input" placeholder="星座名や星の名前（例: オリオン座, シリウス）">
        <button id="search-btn">探す</button>
    </div>

    <div id="info">スマホを動かして夜空を見回そう</div>

    <script>
        // --- 簡易全天星座データ (国際天文学連合が定めた全88星座の一部をサンプルとして定義。実際は88個すべて並べられます) ---
        // 赤経(RA: 0~360度)、赤緯(Dec: -90~90度)の大体の位置
        const starData = [
            // 有名な星・星座
            { name: "オリオン座", ra: 85, dec: 5, type: "constellation" },
            { name: "ベテルギウス", ra: 88, dec: 7, type: "star" },
            { name: "リゲル", ra: 78, dec: -8, type: "star" },
            { name: "大犬座", ra: 100, dec: -20, type: "constellation" },
            { name: "シリウス", ra: 101, dec: -16, type: "star" },
            { name: "小犬座", ra: 114, dec: 5, type: "constellation" },
            { name: "プロキオン", ra: 114, dec: 5, type: "star" },
            { name: "北斗七星 (大熊座)", ra: 165, dec: 55, type: "constellation" },
            { name: "仙后座 (カシオペヤ座)", ra: 15, dec: 60, type: "constellation" },
            { name: "北極星 (ポラリス)", ra: 38, dec: 89, type: "star" },
            { name: "織姫星 (ベガ / 琴座)", ra: 279, dec: 38, type: "star" },
            { name: "彦星 (アルタイル / 鷲座)", ra: 297, dec: 8, type: "star" },
            { name: "デネブ (白鳥座)", ra: 310, dec: 45, type: "star" },
            
            // 黄道十二星座
            { name: "牡羊座", ra: 30, dec: 20, type: "constellation" },
            { name: "牡牛座", ra: 65, dec: 15, type: "constellation" },
            { name: "双子座", ra: 105, dec: 25, type: "constellation" },
            { name: "蟹座", ra: 128, dec: 20, type: "constellation" },
            { name: "獅子座", ra: 160, dec: 15, type: "constellation" },
            { name: "乙女座", ra: 200, dec: -5, type: "constellation" },
            { name: "天秤座", ra: 228, dec: -15, type: "constellation" },
            { name: "蠍座", ra: 250, dec: -26, type: "constellation" },
            { name: "射手座", ra: 285, dec: -25, type: "constellation" },
            { name: "山羊座", ra: 315, dec: -20, type: "constellation" },
            { name: "水瓶座", ra: 340, dec: -10, type: "constellation" },
            { name: "魚座", ra: 5, dec: 10, type: "constellation" }
            
            // ※本来の88星座すべてを網羅する場合、ここに名前と位置(ra, dec)を追加していきます。
        ];

        // 3D空間の基本設定
        let scene, camera, renderer;
        let starsGroup = new THREE.Group();
        const radius = 500; // 星を配置する球体の半径

        // スマホの回転制御用変数
        let alpha = 0, beta = 0, gamma = 0;
        let isMobile = false;

        function init() {
            // 1. シーン・カメラ・レンダラーの作成
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(starsGroup);

            // 2. 宇宙の背景（ランダムな無数の星々）
            const bgStarsGeometry = new THREE.BufferGeometry();
            const bgStarsCount = 2000;
            const positions = new Float32Array(bgStarsCount * 3);

            for(let i=0; i<bgStarsCount*3; i+=3) {
                const u = Math.random();
                const v = Math.random();
                const theta = u * 2.0 * Math.PI;
                const phi = Math.acos(2.0 * v - 1.0);
                
                positions[i] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i+1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i+2] = radius * Math.cos(phi);
            }
            bgStarsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const bgStarsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 1.5 });
            const bgStars = new THREE.Points(bgStarsGeometry, bgStarsMaterial);
            scene.add(bgStars);

            // 3. 星座・有名星データの配置
            starData.forEach(data => {
                // 赤経・赤緯を3D空間のXYZ座標に変換
                const raRad = (data.ra * Math.PI) / 180;
                const decRad = (data.dec * Math.PI) / 180;

                const x = radius * Math.cos(decRad) * Math.cos(raRad);
                const z = radius * Math.cos(decRad) * Math.sin(raRad);
                const y = radius * Math.sin(decRad);

                // 星の光球を作成
                const geo = new THREE.SphereGeometry(data.type === "constellation" ? 4 : 2, 8, 8);
                const mat = new THREE.MeshBasicMaterial({ color: data.type === "constellation" ? 0x00ffff : 0xffaa00 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(x, y, z);
                mesh.userData = { name: data.name };
                starsGroup.add(mesh);
            });

            // リサイズ対応
            window.addEventListener('resize', onWindowResize, false);

            // 検索機能の紐付け
            document.getElementById('search-btn').addEventListener('click', searchStar);
            
            // ループアニメーション開始
            animate();
        }

        // スマホの向き（ジャイロセンサー）をカメラに反映
        function updateCameraRotation() {
            if (!isMobile) return;

            // デバイスの回転角をThree.jsのオイラー角に変換
            const lAlpha = THREE.MathUtils.degToRad(alpha);
            const lBeta = THREE.MathUtils.degToRad(beta);
            const lGamma = THREE.MathUtils.degToRad(gamma);

            const euler = new THREE.Euler(lBeta, lAlpha, -lGamma, 'YXZ');
            camera.quaternion.setFromEuler(euler);
        }

        function animate() {
            requestAnimationFrame(animate);
            updateCameraRotation();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 検索関数：入力された星の方向へカメラを強制的に向ける
        function searchStar() {
            const query = document.getElementById('search-input').value.trim();
            if(!query) return;

            const target = starData.find(d => d.name.includes(query));
            if(target) {
                const raRad = (target.ra * Math.PI) / 180;
                const decRad = (target.dec * Math.PI) / 180;

                const x = radius * Math.cos(decRad) * Math.cos(raRad);
                const z = radius * Math.cos(decRad) * Math.sin(raRad);
                const y = radius * Math.sin(decRad);

                // カメラの注視点をその星に向ける
                camera.lookAt(new THREE.Vector3(x, y, z));
                document.getElementById('info').innerText = `「${target.name}」を発見！その方向を向いています。`;
                
                // PCでのテスト用にジャイロを切る
                if(!isMobile) {
                    document.getElementById('info').innerText += " (PCモード: マウスドラッグは非対応ですが、正面に固定されました)";
                }
            } else {
                document.getElementById('info').innerText = `「${query}」は見つかりませんでした。`;
            }
        }

        // スマホのセンサー許可を取るための設定（特にiOSで必須）
        document.getElementById('permission-btn').addEventListener('click', function() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                // iOS 13+ の処理
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation, true);
                            isMobile = true;
                            startApp();
                        } else {
                            alert('センサーへのアクセスが拒否されました。PCモードで起動します。');
                            startApp();
                        }
                    })
                    .catch(console.error);
            } else {
                // Androidや古いiOS、PCの処理
                if (window.DeviceOrientationEvent) {
                    window.addEventListener('deviceorientation', handleOrientation, true);
                    isMobile = true;
                }
                startApp();
            }
        });

        function handleOrientation(event) {
            alpha = event.alpha; // 方位角 (0-360)
            beta = event.beta;   // 傾き (前後 -180-180)
            gamma = event.gamma; // 傾き (左右 -90-90)
        }

        function startApp() {
            document.getElementById('permission-btn').style.display = 'none';
            init();
        }
    </script>
</body>
</html>
